<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VelvetVerse Radio</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.box{
width:100%;
max-width:900px;
display:flex;
gap:15px;
padding:18px;
border-radius:14px;
background:rgba(10,10,10,0.9);
position:relative;
}

/* neon border */
.box.playing::before{
content:"";
position:absolute;
inset:0;
padding:2px;
border-radius:14px;
background:linear-gradient(90deg,purple,red,purple);
background-size:300% 300%;
animation:borderMove 6s linear infinite;
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}

@keyframes borderMove{
0%{background-position:0%}
100%{background-position:100%}
}

/* glow */
.glow{
position:absolute;
inset:-50%;
background:radial-gradient(circle,purple,transparent),
radial-gradient(circle,red,transparent);
filter:blur(100px);
opacity:0.2;
}

.content{
display:flex;
gap:15px;
width:100%;
z-index:1;
}

/* cover */
img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
animation:breathe 4s infinite;
}

@keyframes breathe{
50%{transform:scale(1.08);}
}

/* text */
.neon{
font-size:22px;
color:#c084fc;
text-shadow:0 0 10px #a855f7;
}

#title{
color:white;
font-size:16px;
margin-top:5px;
}

/* live */
.live{
display:flex;
align-items:center;
gap:5px;
font-size:12px;
color:white;
}

.dot{
width:10px;
height:10px;
background:red;
border-radius:50%;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{transform:scale(1.3);opacity:0.6;}
}

/* eq */
.eq{
display:flex;
gap:3px;
margin-top:5px;
}

.eq div{
width:4px;
height:10px;
background:linear-gradient(purple,red);
animation:eq 1s infinite;
}

.eq div:nth-child(2){animation-delay:.2s;}
.eq div:nth-child(3){animation-delay:.3s;}
.eq div:nth-child(4){animation-delay:.4s;}
.eq div:nth-child(5){animation-delay:.5s;}

@keyframes eq{
50%{height:20px;}
}

/* controls */
.controls{
display:flex;
flex-direction:column;
gap:6px;
}

button{
padding:6px 10px;
cursor:pointer;
}

input{
width:120px;
}
</style>
</head>

<body>

<div class="box">

<div class="glow"></div>

<div class="content">

<img id="cover" src="https://via.placeholder.com/300">

<div style="flex:1">

<div class="live">
<div id="dot" class="dot"></div>
LIVE
</div>

<div class="neon">VelvetVerse Radio</div>

<div id="title">A carregar...</div>

<div class="eq">
<div></div><div></div><div></div><div></div><div></div>
</div>

</div>

<div class="controls">
<button onclick="toggle()">▶ / ⏸</button>
<input type="range" min="0" max="1" step="0.01" value="1" oninput="audio.volume=this.value">
</div>

</div>
</div>

<audio id="radio">
<source src="https://stream3.rcast.net/73595" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("radio");
const dot = document.getElementById("dot");
const box = document.querySelector(".box");

// play/pause
function toggle(){
if(audio.paused){
audio.play();
dot.style.background="lime";
box.classList.add("playing");
}else{
audio.pause();
dot.style.background="red";
box.classList.remove("playing");
}
}

// update nowplaying + cover
async function update(){

try{

// tentar ler metadata via proxy público
let url = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://stream3.rcast.net/73595");

let r = await fetch(url);
let text = await r.text();

// fallback simples
let title = text.substring(0,100);

document.getElementById("title").innerText = title;

// tentar extrair artista e música
let parts = title.split("-");
if(parts.length < 2) return;

let artist = parts[0].trim();
let track = parts[1].trim();

// capa automática
let search = encodeURIComponent(artist + " " + track);
let api = "https://itunes.apple.com/search?term=" + search + "&limit=1";

let res = await fetch(api);
let data = await res.json();

if(data.results && data.results.length > 0){
let img = data.results[0].artworkUrl100;
img = img.replace("100x100","500x500");
document.getElementById("cover").src = img;
}

}catch(e){
console.log(e);
}

}

setInterval(update,5000);
update();
</script>

</body>
</html>
